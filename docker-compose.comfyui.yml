# docker-compose.comfyui.yml
# 运行在 llm-02 机器上（16core CPU, 64G RAM, RTX 4090 24GB）
# 网络: llm-02.localdomain / llm-02.tbd / 10.0.0.2 (100G IB)
# 用法:
#   docker compose -f docker-compose.comfyui.yml up -d
#
# 首次启动前，先下载 GGUF 模型（详见 README.md Step 2）:
#   mkdir -p ./comfyui-data/models/{unet,text_encoders,vae,loras,custom_nodes}
#   hf download unsloth/LTX-2.3-GGUF \
#     --include "distilled/ltx-2.3-22b-distilled-UD-Q4_K_M.gguf" \
#     --local-dir ./comfyui-data/models/unet/
#   hf download unsloth/LTX-2.3-GGUF \
#     --include "vae/ltx-2.3-22b-dev_video_vae.safetensors" \
#     --local-dir ./comfyui-data/models/vae/
#   hf download unsloth/LTX-2.3-GGUF \
#     --include "text_encoders/gemma-3-12b-it-q4_k_m.gguf" \
#     --local-dir ./comfyui-data/models/text_encoders/

version: "3.8"

networks:
  vidpipe_comfy:
    driver: bridge

services:
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    container_name: vidpipe-comfyui
    restart: unless-stopped
    networks: [vidpipe_comfy]
    ports:
      - "0.0.0.0:8188:8188"   # ComfyUI Web UI & API，所有接口监听（含 IB 10.0.0.2）
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      HF_HOME: /root/.cache/huggingface
      # ComfyUI 进程内部也监听 0.0.0.0，供 llm-01 通过 IB/千兆 远程调用
      CLI_ARGS: "--listen 0.0.0.0 --port 8188"
    volumes:
      - ./comfyui-data/models:/opt/ComfyUI/models
      - ./comfyui-data/output:/opt/ComfyUI/output
      - ./comfyui-data/input:/opt/ComfyUI/input
      - ./comfyui-data/custom_nodes:/opt/ComfyUI/custom_nodes
      - /home/xi/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 48g
        reservations:
          memory: 16g
    shm_size: "8gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
