# docker-compose.comfyui.yml
# 运行在 llm-02 机器上（16core CPU, 64G RAM, RTX 4090 24GB）
# 用法: docker compose -f docker-compose.comfyui.yml up -d

version: "3.8"

networks:
  vidpipe_comfy:
    driver: bridge

services:
  comfyui:
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    container_name: vidpipe-comfyui
    restart: unless-stopped
    networks: [vidpipe_comfy]
    ports:
      - "0.0.0.0:8188:8188"
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      HF_HOME: /root/.cache/huggingface
      WEB_ENABLE_AUTH: "false"
      # ai-dock 正规 provisioning 机制: 安装 pip 包和 custom nodes
      PROVISIONING_SCRIPT: "/opt/ComfyUI/custom_nodes/../../../config/provisioning/comfyui.sh"
    volumes:
      - ./comfyui-data/models:/opt/ComfyUI/models
      - ./comfyui-data/output:/opt/ComfyUI/output
      - ./comfyui-data/input:/opt/ComfyUI/input
      - ./comfyui-data/custom_nodes:/opt/ComfyUI/custom_nodes
      - /home/xi/.cache/huggingface:/root/.cache/huggingface
      # ai-dock 读取此文件作为 ComfyUI 启动参数
      - ./comfyui_args.conf:/etc/comfyui_args.conf:ro
      # provisioning 脚本 mount 进容器
      - ./config/provisioning:/config/provisioning:ro
    deploy:
      resources:
        limits:
          memory: 48g
        reservations:
          memory: 16g
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "8gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
