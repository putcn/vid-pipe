# docker-compose.vllm.yml
# 运行在 llm-01 机器上
# 用法（与主服务合并启动）:
#   docker compose -f docker-compose.yml -f docker-compose.vllm.yml up -d
# 或单独启动 vLLM:
#   docker compose -f docker-compose.vllm.yml up -d
#
# 模型说明:
#   cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
#   - Gemma 4 MoE 版本，激活参数只有 ~4B，单张 4090 24GB 可跑
#   - AWQ 4bit 量化，实际占用显存 ~10-14GB，推理速度 ~53 tok/s
#   - 社区已验证 vLLM 可跑，高于 bitsandbytes（后者 vLLM 即将废弃）

version: "3.8"

networks:
  vidpipe:
    external: true  # 复用主 compose 已创建的网络

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vidpipe-vllm
    restart: unless-stopped
    networks: [vidpipe]
    ports:
      - "8000:8000"
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_NO_USAGE_STATS: "1"
    volumes:
      # 宿主机本地 HuggingFace 缓存目录，避免重复下载
      - /home/xi/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "2gb"  # vLLM 张量传递需要共享内存，默认 64MB 会报错
    command: >
      --model cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      --quantization awq
      --served-model-name gemma-4-27b-it
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.92
      --max-model-len 8192
      --max-num-seqs 1
      --disable-log-requests
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s  # 模型加载时间较长
