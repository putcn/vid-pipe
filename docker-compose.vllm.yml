# docker-compose.vllm.yml
# 运行在 llm-01 机器上
# 网络: llm-01.localdomain / llm-01.tbd / 10.0.0.1 (100G IB)
# 用法（与主服务合并启动）:
#   docker compose -f docker-compose.yml -f docker-compose.vllm.yml up -d
# 或单独启动 vLLM:
#   docker compose -f docker-compose.vllm.yml up -d
#
# 模型说明:
#   cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
#   - Gemma 4 MoE 版本，激活参数只有 ~4B，单张 4090 24GB 可跑
#   - 内部实际是 compressed-tensors 格式，不需要手动指定 --quantization
#   - vLLM 会自动从 model config 检测量化方式
#
# 镜像说明:
#   vllm/vllm-openai:gemma4 是 vLLM 官方专为 Gemma 4 打的镜像
#   内置 transformers 5.5+，:latest 版本不识别 gemma4 架构
#
# 注意: vllm/vllm-openai 镜像 entrypoint 已经是 "vllm serve"
#       command 里直接写模型名和参数，不要再写 serve
#
# 上下文窗口说明:
#   max-model-len=32768 (~32K tokens)
#   模型权重占用 ~18-20GB，KV cache 占用 ~2GB，总计 ~22GB，4090 安全。
#   寙当前 vid-pipe 流程远未用到 2K tokens，但为将来批量生成/去重等扩展留足够余量。

version: "3.8"

networks:
  vidpipe:
    external: true

services:
  vllm:
    image: vllm/vllm-openai:gemma4
    container_name: vidpipe-vllm
    restart: unless-stopped
    networks: [vidpipe]
    ports:
      - "0.0.0.0:8000:8000"   # vLLM OpenAI API，所有接口监听
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      VLLM_NO_USAGE_STATS: "1"
    volumes:
      - /home/xi/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: "2gb"
    command:
      - cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit
      - --served-model-name
      - gemma-4-27b-it
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "0.92"
      - --max-model-len
      - "32768"
      - --max-num-seqs
      - "1"
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
